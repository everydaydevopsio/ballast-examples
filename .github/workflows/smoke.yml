name: Smoke Tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.sample }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sample: go-sample
          - sample: python-sample
          - sample: typescript-sample

    steps:
      - name: Checkout examples repo
        uses: actions/checkout@v4

      - name: Checkout ballast repo
        uses: actions/checkout@v4
        with:
          repository: everydaydevopsio/ballast
          path: ballast

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ballast/packages/ballast-go/go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ballast/.nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build Ballast CLIs
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci/bin"

          go build -C ballast/packages/ballast-go -o "$GITHUB_WORKSPACE/.ci/bin/ballast" ./cmd/ballast-go
          go build -C ballast/packages/ballast-go -o "$GITHUB_WORKSPACE/.ci/bin/ballast-go" ./cmd/ballast-go

          pnpm --dir ballast install --frozen-lockfile
          pnpm --dir ballast --filter @everydaydevopsio/ballast run build

          cat > "$GITHUB_WORKSPACE/.ci/bin/ballast-typescript" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          node "$GITHUB_WORKSPACE/ballast/packages/ballast-typescript/dist/cli.js" "$@"
          SCRIPT

          cat > "$GITHUB_WORKSPACE/.ci/bin/ballast-python" <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          PYTHONPATH="$GITHUB_WORKSPACE/ballast/packages/ballast-python:${PYTHONPATH:-}" \
            python3 -c "from ballast.cli import main; import sys; raise SystemExit(main(sys.argv[1:]))" "$@"
          SCRIPT

          chmod +x "$GITHUB_WORKSPACE/.ci/bin/ballast-typescript" "$GITHUB_WORKSPACE/.ci/bin/ballast-python"
          echo "$GITHUB_WORKSPACE/.ci/bin" >> "$GITHUB_PATH"

      - name: Run smoke install
        run: |
          set -euo pipefail
          cd "${{ matrix.sample }}"
          ballast install --target cursor --agent linting --yes

      - name: Verify outputs
        run: |
          set -euo pipefail
          test -f "${{ matrix.sample }}/.cursor/rules/linting.mdc"
