version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/go-sample"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/python-sample"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/typescript-sample"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
